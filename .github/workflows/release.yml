name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: go

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web assets
        run: cd web && npm ci && npm run build

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags "-X main.version=${{ needs.release-please.outputs.tag_name }} -w -s" \
            -o lw-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/lw

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} \
            lw-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Attest binary
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: lw-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload artifact for container build
        if: matrix.goos == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: lw-${{ matrix.goarch }}
          path: lw-${{ matrix.goos }}-${{ matrix.goarch }}

  container:
    needs: [release-please, build]
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: lw-amd64
          path: bin/amd64

      - uses: actions/download-artifact@v4
        with:
          name: lw-arm64
          path: bin/arm64

      - name: Prepare binaries
        run: |
          chmod +x bin/amd64/* bin/arm64/*
          mv bin/amd64/lw-linux-amd64 bin/amd64/lw
          mv bin/arm64/lw-linux-arm64 bin/arm64/lw

      - name: Build and push amd64
        id: amd64
        uses: docker/build-push-action@v6
        with:
          context: bin/amd64
          file: Containerfile.runtime
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ needs.release-please.outputs.version }}-amd64

      - name: Build and push arm64
        id: arm64
        uses: docker/build-push-action@v6
        with:
          context: bin/arm64
          file: Containerfile.runtime
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:${{ needs.release-please.outputs.version }}-arm64

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:${{ needs.release-please.outputs.version }} \
            -t ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}:${{ needs.release-please.outputs.version }}-amd64 \
            ${{ env.IMAGE }}:${{ needs.release-please.outputs.version }}-arm64

      - name: Attest image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.amd64.outputs.digest }}
          push-to-registry: true
